<!DOCTYPE html>
<html>
<head>
<title>Applied Jobs</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<h2 style="text-align:center; margin-top:20px;">Applied Jobs</h2>

<div id="applied-list"></div>

<script>

const appliedJobs = JSON.parse(localStorage.getItem("appliedJobs")) || [];

fetch("http://localhost:8080/api/jobs")
.then(res => res.json())
.then(jobs => {

    const container = document.getElementById("applied-list");
    container.innerHTML = "";

    let found = false;

    jobs.forEach(job => {

        if (appliedJobs.includes(job.id) || appliedJobs.includes(String(job.id))) {

            found = true;

            const div = document.createElement("div");
            div.className = "job-card";

            div.innerHTML = `
                <h3>${job.title}</h3>
                <p>${job.company}</p>
                <p>${job.location}</p>
            `;

            container.appendChild(div);
        }
    });

    if (!found) {
        container.innerHTML = "<p style='text-align:center;'>No applied jobs ❌</p>";
    }

});

</script>

</body>
</html>

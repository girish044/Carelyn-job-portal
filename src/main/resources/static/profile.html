<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<link rel="stylesheet" href="/css/style.css">

<style>
.profile-container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #2f5bd3;
    color: white;
    border: none;
}
</style>

</head>

<body>

<div class="profile-container">

<h2>My Profile</h2>

<label>Name</label>
<input type="text" id="name" disabled>

<label>Email</label>
<input type="email" id="email" disabled>

<button onclick="enableEdit()">Edit Profile</button>
<button onclick="updateProfile()" id="saveBtn" style="display:none;">Save</button>

</div>

<script>

// LOAD USER
const email = localStorage.getItem("userEmail");

fetch(`http://localhost:8080/api/users/${email}`)
.then(res => res.json())
.then(user => {
    document.getElementById("name").value = user.name;
    document.getElementById("email").value = user.email;
});

// ENABLE EDIT
function enableEdit(){
    document.getElementById("name").disabled = false;
    document.getElementById("saveBtn").style.display = "block";
}

// UPDATE PROFILE
function updateProfile(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    fetch("http://localhost:8080/api/users/update", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email
        })
    })
    .then(res => res.json())
    .then(data => {

        alert("Updated ✅");

        // 🔥 IMPORTANT
        localStorage.setItem("userName", data.name);

        window.location.href = "index.html";
    });
}

</script>

</body>
</html>
